<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search — DU Lal Bus</title>
  <meta name="description" content="Search for your bus stop or route name to instantly find which DU buses serve you and when." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚌</text></svg>" />
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-brand">
    <div class="bus-icon">🚌</div>
    <div>DU <span>Lal Bus</span></div>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="schedule.html">Schedule</a></li>
    <li><a href="stops.html">Stops Map</a></li>
    <li><a href="search.html">Search</a></li>
  </ul>
  <button class="nav-mobile-btn" id="navMobileBtn">☰</button>
</nav>

<div class="page-wrap">

  <!-- Search Hero -->
  <div class="search-hero">
    <h1>🔍 Find Your Bus</h1>
    <p>Search by stop name (e.g. "Mirpur") or route name (e.g. "Choitali")</p>
    <div class="search-box-wrap">
      <span class="search-icon">🔍</span>
      <input
        type="search"
        class="search-input"
        id="searchInput"
        placeholder="Type a stop or route name…"
        autocomplete="off"
        autofocus
      />
    </div>
  </div>

  <!-- Results -->
  <div class="search-results" id="searchResults" style="display:none">
    <div class="search-results-inner" id="resultsInner">
      <div class="results-label" id="resultsCount"></div>
    </div>
  </div>

  <!-- Default state: quick picks -->
  <div class="container" id="quickPicks" style="padding-bottom:60px">
    <h2 class="section-title" style="font-size:1.1rem;font-weight:600;color:var(--text-muted);margin-bottom:16px">
      Popular stops
    </h2>
    <div style="display:flex;flex-wrap:wrap;gap:10px" id="quickPicksGrid"></div>
  </div>

</div>

<footer class="footer">
  <p>DU Lal Bus Info · Built for Dhaka University students · Data from the <a href="https://github.com/MasadMoral/rtx_lulbus" target="_blank">Lal Bus app</a></p>
</footer>

<script src="data/routes.js"></script>
<script src="data/stops.js"></script>
<script src="js/app.js"></script>
<script src="js/search.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  // Popular stop quick picks
  const popular = [
    'মিরপুর', 'গুলশান', 'টিএসসি', 'যাত্রাবাড়ী',
    'বাড্ডা', 'ধানমন্ডি ১৫ (কাকলী)', 'আব্দুল্লাপুর', 'কাজীপাড়া',
    'চিটাগাং রোড', 'রামপুরা টিভি সেন্টার'
  ];
  const grid = document.getElementById('quickPicksGrid');
  const input = document.getElementById('searchInput');
  const resultsWrap = document.getElementById('searchResults');
  const quickPicks = document.getElementById('quickPicks');

  popular.forEach(stop => {
    const btn = document.createElement('button');
    btn.className = 'btn btn-ghost';
    btn.style.cssText = 'font-size:0.82rem;padding:7px 14px;';
    btn.textContent = '📍 ' + stop;
    btn.addEventListener('click', () => {
      input.value = stop;
      input.dispatchEvent(new Event('input'));
      quickPicks.style.display = 'none';
    });
    grid.appendChild(btn);
  });

  input.addEventListener('input', () => {
    if (input.value.trim().length > 0) {
      quickPicks.style.display = 'none';
    } else {
      quickPicks.style.display = 'block';
      resultsWrap.style.display = 'none';
    }
  });
});
</script>
</body>
</html>
